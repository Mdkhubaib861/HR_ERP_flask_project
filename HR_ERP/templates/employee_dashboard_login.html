<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>employee Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: #eef2f7;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, #0f2027, #203a43, #2c5364);
        }

        .navbar-brand,
        .navbar-nav .nav-link {
            color: #fff !important;
            font-weight: 600;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 56px;
            left: 0;
            background: #111827;
            padding-top: 20px;
        }

        .sidebar a {
            color: #9ca3af;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1f2933;
            color: #38bdf8;
        }

        /* Main Content */
        .content {
            margin-left: 250px;
            padding: 40px;
        }

        /* Login Card */
        .login-card {
            max-width: 400px;
            margin: 80px auto;
            border-radius: 14px;
            border: none;
        }

        .login-card .card-header {
            background: linear-gradient(90deg, #0ea5e9, #22d3ee);
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
        }

        .btn-primary {
            background: #0ea5e9;
            border: none;
        }

        .btn-primary:hover {
            background: #0284c7;
        }
    </style>
</head>

<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top shadow">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
             xyz_company_management_system
        </a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="/"> Home</a>
            </li>
        </ul>
    </div>
</nav>

<!-- Sidebar -->
<div class="sidebar">
</div>
<!-- Content -->
<div class="content">
    <!-- Login Card -->
    <div class="card login-card shadow">
        <div class="card-header">
            employee Login
        </div>
        <div class="card-body p-4">
            <form action="/employee_dashboard" method="POST">
                <div class="mb-3">
                    <label class="form-label">email</label>
                    <input type="email" name="email"  class="form-control" required>
                </div>


                <div class="d-grid">
                    <button class="btn btn-primary ">
                        <i class=""></i> Login
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>

</body>
</html>
